<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Rock ,Paper ,Scissor Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <h3>Rock Paper Scissors Game</h3>
    <p class="msg">Choose your move and see if you can beat the computer!</p>
    
    <p>
    <button onclick="playGame('rock')" class='icons'>✊</button>

    <button onclick="playGame('paper') "class='icons'>🖐️</button>

    <button onclick="playGame('scissor')"class='icons'>✌️</button>
    </p>
    
    <button onclick="resetScore()" class="resetScore">
        Reset Score
    </button>
   
    <p class="js_result result"></p>
    <p class="js_moves result"></p>
    <p class="js_score result"></p>
    </div>
   
<script src="script.js"></script>
</body>
</html>
